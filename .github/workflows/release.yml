name: Build release packages

# When a GitHub Release is published, build the Chrome and Firefox packages and
# attach them to that release. No store credentials are used or stored anywhere —
# you download the zips from the release and upload them to the stores yourself.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & attach packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate JSON and JS
        run: |
          node --check content.js
          node --check popup/popup.js
          for f in manifest.json _locales/*/messages.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" || { echo "Invalid JSON: $f"; exit 1; }
          done
          # Every locale must define the same keys as the English base.
          node -e '
            const fs = require("fs");
            const base = Object.keys(JSON.parse(fs.readFileSync("_locales/en/messages.json"))).sort();
            for (const d of fs.readdirSync("_locales")) {
              const k = Object.keys(JSON.parse(fs.readFileSync("_locales/" + d + "/messages.json"))).sort();
              const miss = base.filter((x) => !k.includes(x));
              if (miss.length) { console.error(d + " missing keys: " + miss.join(", ")); process.exit(1); }
            }
            console.log("All locales consistent");
          '

      - name: Read version from manifest
        id: meta
        run: echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Assemble shippable files
        run: |
          mkdir -p dist
          cp manifest.json content.js background.js dist/
          cp -r popup icons _locales dist/

      - name: Build Firefox package (gecko keys; background as event-page scripts)
        run: |
          jq '.background = {"scripts":["background.js"]}' manifest.json > dist/manifest.json
          cd dist && zip -rq "../video-speed-controller-pro-firefox-v${{ steps.meta.outputs.version }}.zip" . && cd ..

      - name: Build Chrome package (Firefox-only keys stripped; background as service worker)
        run: |
          jq 'del(.browser_specific_settings) | .background = {"service_worker":"background.js"}' manifest.json > dist/manifest.json
          cd dist && zip -rq "../video-speed-controller-pro-chrome-v${{ steps.meta.outputs.version }}.zip" . && cd ..

      - name: Upload packages as workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: extension-packages
          path: video-speed-controller-pro-*.zip

      - name: Attach packages to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" video-speed-controller-pro-*.zip --clobber
