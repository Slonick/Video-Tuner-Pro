name: Build release packages

# When a GitHub Release is published, build the Chrome and Firefox packages,
# attach them to that release, and publish them to both stores.
# Store credentials live in repo secrets (one-time setup):
#   Chrome:  CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN
#            (generate all three with `npx chrome-webstore-upload-keys`)
#   Firefox: AMO_JWT_ISSUER, AMO_JWT_SECRET
#            (addons.mozilla.org → Tools → Manage API Keys)
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & attach packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate JSON and locales
        run: |
          for f in src/manifest.json src/_locales/*/messages.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" || { echo "Invalid JSON: $f"; exit 1; }
          done
          # Every locale must define the same keys as the English base.
          node -e '
            const fs = require("fs");
            const base = Object.keys(JSON.parse(fs.readFileSync("src/_locales/en/messages.json"))).sort();
            for (const d of fs.readdirSync("src/_locales")) {
              const k = Object.keys(JSON.parse(fs.readFileSync("src/_locales/" + d + "/messages.json"))).sort();
              const miss = base.filter((x) => !k.includes(x));
              if (miss.length) { console.error(d + " missing keys: " + miss.join(", ")); process.exit(1); }
            }
            console.log("All locales consistent");
          '

      - name: Read version from manifest
        id: meta
        run: echo "version=$(node -p "require('./src/manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Type-check and test
        run: |
          npm run check
          npm test

      - name: Build (bundled + minified, per target)
        run: npm run build

      - name: Package Chrome and Firefox zips
        run: |
          cd dist/chrome && zip -rq "../../video-tuner-pro-chrome-v${{ steps.meta.outputs.version }}.zip" . && cd ../..
          cd dist/firefox && zip -rq "../../video-tuner-pro-firefox-v${{ steps.meta.outputs.version }}.zip" . && cd ../..

      - name: Upload packages as workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: extension-packages
          path: video-tuner-pro-*.zip

      - name: Attach packages to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" video-tuner-pro-*.zip --clobber

      - name: Publish to Chrome Web Store
        if: github.event_name == 'release'
        env:
          EXTENSION_ID: ichlipldofdemkhlhnoekfkpfejfanno
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: npx chrome-webstore-upload-cli@3 upload --source "video-tuner-pro-chrome-v${{ steps.meta.outputs.version }}.zip" --auto-publish

      - name: Publish to Firefox Add-ons
        if: github.event_name == 'release'
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          # AMO requires source code for review because the build is minified.
          git archive HEAD -o source.zip
          # --approval-timeout 0: submit and exit — listed reviews take hours/days.
          npx web-ext@8 sign --channel listed --source-dir dist/firefox \
            --upload-source-code source.zip --approval-timeout 0
