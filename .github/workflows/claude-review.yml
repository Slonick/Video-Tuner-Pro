name: Claude PR Review

# Automated code review by Claude on every PR (no @mention needed).
# Auth via a Claude subscription (Pro/Max) — billed to the subscription, not the API.
# One-time setup required:
#   1. Install the Claude GitHub App: https://github.com/apps/claude (this repo).
#   2. Generate a subscription token locally: `claude setup-token` (needs Pro/Max),
#      then add it as repo secret CLAUDE_CODE_OAUTH_TOKEN
#      (Settings → Secrets and variables → Actions).
# Note: does not run on PRs from forks (GitHub Actions secret restriction).
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write   # claude-code-action exchanges an OIDC token for its GitHub token

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request and report ONLY genuinely critical issues.
            If there are none, reply with exactly one line: "No critical issues."
            Do not comment on anything non-critical.

            Work from the diff, not the whole tree: start with
            `git diff origin/main...HEAD` and judge the changed hunks. Open a
            full file only when a hunk genuinely can't be judged without its
            surrounding context, and don't re-read content the diff already
            shows — this keeps the review fast and cheap.

            CRITICAL means: a real bug or regression that changes/breaks behaviour;
            a crash, hang, data loss, or security vulnerability; a broken build or
            failing test; or incorrect logic in the fragile areas of this MV3
            TypeScript extension — live-stream detection, the live-sync catch-up
            algorithm, Web Audio routing/metering, popup⇄content message passing,
            cross-origin/CORS handling, extension-context invalidation, or the
            per-target (Chrome/Firefox) manifest.

            NOT critical (stay silent): style, naming, formatting, comments,
            structure/refactor opinions, micro-optimizations, "nice to have"
            suggestions, optional/extra test coverage, and any praise.

            For each critical issue give file:line, why it breaks something, and
            the fix. Be terse. When unsure whether something is critical, omit it.
