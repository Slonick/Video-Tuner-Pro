name: Generate promo images

# Run on demand (Actions tab → "Generate promo images" → Run workflow), separate
# from the release build so it can churn in parallel. Renders the localized store
# promo images for every locale × state and opens a PR with the changes — so it
# works with branch protection (no direct push / no bypass needed). Review the
# PR's images and merge.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  promo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: browser-actions/setup-chrome@v2
        id: chrome
        with:
          chrome-version: stable

      # The runner has no CJK/Devanagari fonts — ja/zh_CN/hi promos render as
      # tofu boxes without these.
      - name: Install fonts for non-Latin locales
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk fonts-noto-core

      - run: npm ci

      - name: Build (the popup the promos render)
        run: npm run build

      - name: Render promos (all locales × states)
        env:
          CHROME: ${{ steps.chrome.outputs.chrome-path }}
        run: npm run promo

      - name: Open/update a PR with the promo images
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ -z "$(git status --porcelain .promo/store)" ]; then
            echo "No promo changes — nothing to PR."
            exit 0
          fi
          BRANCH="chore/promo-images"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "$BRANCH"
          git add .promo/store
          git commit -m "chore(promo): regenerate store images"
          git push -f origin "$BRANCH"
          # Reuse the open PR for this branch if there is one, else open a new one.
          gh pr view "$BRANCH" --json state -q .state 2>/dev/null | grep -qx OPEN || \
            gh pr create --base "$DEFAULT_BRANCH" --head "$BRANCH" \
              --title "chore(promo): regenerate store images" \
              --body "Automated promo regeneration. Review the updated \`.promo/store/\` images and merge."
