name: Tests

# Runs on every push to main and on every pull request. Enable branch protection
# (Settings → Branches → require the "test" status check) to block merging a PR
# whose tests fail.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Type-check (tsc, strict)
        run: npm run check

      # Runs the suite AND enforces the coverage thresholds in vitest.config.ts —
      # the job fails if any metric drops below its floor.
      - name: Unit tests + coverage (Vitest)
        run: npm run test:coverage

      # Render the coverage totals on the run/PR summary page, even when the gate
      # above fails (so a regression shows the numbers, not just a red X).
      - name: Coverage summary
        if: always()
        run: |
          [ -f coverage/coverage-summary.json ] || { echo "No coverage summary produced."; exit 0; }
          node -e '
            const t = require("./coverage/coverage-summary.json").total;
            const row = (k) => `| ${k} | ${t[k].pct}% | ${t[k].covered}/${t[k].total} |`;
            const md = [
              "### Coverage",
              "| Metric | % | Covered |",
              "|---|---|---|",
              row("lines"), row("statements"), row("functions"), row("branches"),
            ].join("\n");
            require("fs").appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + "\n");
          '

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # Functional end-to-end: load the BUILT extension into real Chromium and drive it
  # on a local fixture page (speed, persistence, badge, audio graph + guard cases).
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium + system deps
        run: npx playwright install --with-deps chromium

      - name: Build the extension and run the E2E suite
        run: npm run test:e2e

      # Render the E2E totals on the run/PR summary page (mirrors the Vitest job),
      # even when the suite fails.
      - name: E2E summary
        if: always()
        run: |
          [ -f test-results/results.json ] || { echo "No E2E results produced."; exit 0; }
          node -e '
            const r = require("./test-results/results.json");
            const s = r.stats || {};
            const passed = s.expected || 0, failed = s.unexpected || 0, flaky = s.flaky || 0, skipped = s.skipped || 0;
            const total = passed + failed + flaky + skipped;
            const files = {};
            const walk = (suites) => (suites || []).forEach((su) => {
              (su.specs || []).forEach((sp) => {
                const f = (sp.file || su.file || "?").split("/").pop();
                (files[f] ||= { p: 0, f: 0 });
                sp.ok ? files[f].p++ : files[f].f++;
              });
              walk(su.suites);
            });
            walk(r.suites);
            const rows = Object.entries(files).map(([f, c]) => `| ${f} | ${c.p} | ${c.f} |`).join("\n");
            const md = [
              "## Playwright E2E Report",
              "",
              "### Summary",
              `- **Result:** ${failed ? "❌" : "✅"} ${passed} passed` +
                (failed ? ` · ${failed} failed` : "") + (flaky ? ` · ${flaky} flaky` : "") +
                (skipped ? ` · ${skipped} skipped` : "") + ` · ${total} total`,
              `- **Duration:** ${Math.round((s.duration || 0) / 1000)}s`,
              "",
              "### Specs",
              "| Spec | Passed | Failed |",
              "|---|---|---|",
              rows,
            ].join("\n");
            require("fs").appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + "\n");
          '

      - name: Upload the Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
