name: CI

# lint is the cheap fast-fail gate; unit and e2e then run in parallel (both only
# need lint), so a failure in the basics short-circuits before any tests run while
# the two independent test layers still finish as fast as possible. On pull
# requests a Claude code-quality review runs last, once unit AND e2e are green.
#
# Runs on every push to main (post-merge) and on every pull request. Enable branch
# protection (Settings → Branches → require the "lint" / "unit" / "e2e" checks) to
# block merging a PR whose pipeline fails.
on:
  push:
    branches: [main]
  pull_request:
  workflow_call: # reused by release.yml as the pre-publish gate

permissions:
  contents: read

# A newer push to the same ref cancels the in-progress run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Static analysis (fastest gate) ─────────────────────────────────────────
  lint:
    name: lint
    runs-on: [self-hosted, unraid]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check (tsc, strict)
        run: npm run check

  # ── Unit tests + coverage gate (runs only if lint passed) ──────────────────
  unit:
    name: unit
    needs: lint
    runs-on: [self-hosted, unraid]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Runs the suite AND enforces the coverage thresholds in vitest.config.ts —
      # the job fails if any metric drops below its floor.
      - name: Unit tests + coverage (Vitest)
        run: npm run test:coverage

      # Render the coverage totals on the run/PR summary page, even when the gate
      # above fails (so a regression shows the numbers, not just a red X).
      - name: Coverage summary
        if: always()
        run: |
          [ -f coverage/coverage-summary.json ] || { echo "No coverage summary produced."; exit 0; }
          node -e '
            const t = require("./coverage/coverage-summary.json").total;
            const row = (k) => `| ${k} | ${t[k].pct}% | ${t[k].covered}/${t[k].total} |`;
            const md = [
              "### Coverage",
              "| Metric | % | Covered |",
              "|---|---|---|",
              row("lines"), row("statements"), row("functions"), row("branches"),
            ].join("\n");
            require("fs").appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + "\n");
          '

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ── End-to-end (in parallel with unit; both gated on lint) ─────────────────
  # Loads the BUILT extension into real Chromium (--headless=new, no xvfb) and
  # drives it on a local fixture page.
  e2e:
    name: e2e
    needs: lint
    runs-on: [self-hosted, unraid]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # No `container:` here — a container job inside the containerized self-hosted
      # runner can't resolve the runner's /__e (node) bind-mount on the Docker host
      # (DooD). Install Chromium + system deps directly on the runner instead; the
      # long-lived runner keeps both cached across runs.
      - name: Install Playwright Chromium + system deps
        run: npx playwright install --with-deps chromium

      - name: Build the extension and run the E2E suite
        run: npm run test:e2e

      # Render the E2E totals on the run/PR summary page (mirrors the unit job),
      # even when the suite fails.
      - name: E2E summary
        if: always()
        run: |
          [ -f test-results/results.json ] || { echo "No E2E results produced."; exit 0; }
          node -e '
            const r = require("./test-results/results.json");
            const s = r.stats || {};
            const passed = s.expected || 0, failed = s.unexpected || 0, flaky = s.flaky || 0, skipped = s.skipped || 0;
            const total = passed + failed + flaky + skipped;
            const files = {};
            const walk = (suites) => (suites || []).forEach((su) => {
              (su.specs || []).forEach((sp) => {
                const f = (sp.file || su.file || "?").split("/").pop();
                (files[f] ||= { p: 0, f: 0 });
                sp.ok ? files[f].p++ : files[f].f++;
              });
              walk(su.suites);
            });
            walk(r.suites);
            const rows = Object.entries(files).map(([f, c]) => `| ${f} | ${c.p} | ${c.f} |`).join("\n");
            const md = [
              "## Playwright E2E Report",
              "",
              "### Summary",
              `- **Result:** ${failed ? "❌" : "✅"} ${passed} passed` +
                (failed ? ` · ${failed} failed` : "") + (flaky ? ` · ${flaky} flaky` : "") +
                (skipped ? ` · ${skipped} skipped` : "") + ` · ${total} total`,
              `- **Duration:** ${Math.round((s.duration || 0) / 1000)}s`,
              "",
              "### Specs",
              "| Spec | Passed | Failed |",
              "|---|---|---|",
              rows,
            ].join("\n");
            require("fs").appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + "\n");
          '

      - name: Upload the Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── Claude code-quality review (PRs only, last — runs only if unit + e2e passed) ─
  # Auth via a Claude subscription (Pro/Max) token in secret CLAUDE_CODE_OAUTH_TOKEN
  # (`claude setup-token`). Skipped on push events and on fork PRs (no secret).
  claude-review:
    name: claude-review
    needs: [unit, e2e]
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, unraid]
    permissions:
      contents: read
      pull-requests: write
      id-token: write # claude-code-action exchanges an OIDC token for its GitHub token
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The promo-regeneration PR is opened by github-actions[bot]; the action
          # blocks bot-initiated runs unless they're allow-listed.
          allowed_bots: "github-actions[bot]"
          prompt: |
            Review this pull request and report ONLY genuinely critical issues.
            If there are none, reply with exactly one line: "No critical issues."
            Do not comment on anything non-critical.

            Work from the diff, not the whole tree: start with
            `git diff origin/main...HEAD` and judge the changed hunks. Open a
            full file only when a hunk genuinely can't be judged without its
            surrounding context, and don't re-read content the diff already
            shows — this keeps the review fast and cheap.

            CRITICAL means: a real bug or regression that changes/breaks behaviour;
            a crash, hang, data loss, or security vulnerability; a broken build or
            failing test; or incorrect logic in the fragile areas of this MV3
            TypeScript extension — live-stream detection, the live-sync catch-up
            algorithm, Web Audio routing/metering, popup⇄content message passing,
            cross-origin/CORS handling, extension-context invalidation, or the
            per-target (Chrome/Firefox) manifest.

            NOT critical (stay silent): style, naming, formatting, comments,
            structure/refactor opinions, micro-optimizations, "nice to have"
            suggestions, optional/extra test coverage, and any praise.

            For each critical issue give file:line, why it breaks something, and
            the fix. Be terse. When unsure whether something is critical, omit it.
